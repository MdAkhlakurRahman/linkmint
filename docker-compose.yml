services:
  postgres:
    image: postgres:17
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkmint

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres-data: